<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Scoreboard - Advanced OBS Overlay</title>
    <style>
        :root {
            /* สีพื้นฐาน (รับค่าจาก URL ได้) */
            --c-header-bg: #f59600; --c-header-text: #ffffff;
            --c-team-bg-alive: #ffffff; --c-team-text-alive: #000000;
            --c-team-bg-dead: #222222; --c-team-text-dead: #7a7a7a;
            --c-hp-alive: #2ecc71; --c-hp-knocked: #ff0000;
            --c-elim-bg: #ccee00; --c-elim-text: #111111;
            --c-tick-alive: #ffffff; --c-tick-knocked: #ff0000;
            --gif-duration: 4s; 
        }

        @font-face {
            font-family: 'TransducerCondensed';
            src: url('transducer-condensedbold.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }

        * {
            font-family: 'TransducerCondensed', sans-serif !important;
            letter-spacing: 0.5px;
            font-weight: normal !important; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
        }

        body { margin: 0; padding: 20px; background-color: transparent; }

        .scoreboard-container { display: flex; flex-direction: column; width: 260px; position: relative; border-radius: 0px !important; overflow: visible !important; }
        #scoreboard { display: flex; flex-direction: column; width: 100%; position: relative; overflow: visible !important; }
        
        .header-row { height: 28px; position: relative; z-index: 20; background-color: var(--c-header-bg); color: var(--c-header-text); border-radius: 0px !important; }
        .row-grid { display: grid; grid-template-columns: 24px minmax(0, 1fr) 42px 30px 38px; align-items: center; box-sizing: border-box; padding: 0 4px; position: relative; z-index: 5; }
        
        .team-wrapper { position: relative; transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); z-index: 1; overflow: visible !important; }
        .team-wrapper.is-moving { z-index: 10; }
        .team-wrapper.hidden-top4 { display: none !important; }

        .team-row-inner {
            text-transform: uppercase; position: relative; 
            transition: max-height 0.4s ease, opacity 0.4s ease;
            z-index: 2; color: var(--c-team-text-alive);
            border-radius: 0px !important;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-color: var(--c-team-bg-alive);
            transition: background-color 0.4s ease;
        }

        .team-row-inner .row-grid { height: 32px; }
        .team-row-inner.expanded .row-grid { border-bottom: 1px solid rgba(128, 128, 128, 0.3); margin-bottom: 5px; }
        .team-row-inner.collapsed { max-height: 32px; padding-bottom: 0; overflow: hidden; }
        .team-row-inner.expanded { max-height: 250px; padding-bottom: 8px; overflow: hidden; }
        
        .team-row-inner.first-place { border-bottom: 1px solid #bfbfbf; }
        .team-row-inner.normal-place { border-bottom: 1px solid #bfbfbf; }
        
        .team-row-inner.eliminated-team .bg-layer { background-color: var(--c-team-bg-dead) !important; }
        .team-row-inner.eliminated-team { color: var(--c-team-text-dead) !important; }

        @keyframes bluechip-glow { 
            0% { filter: brightness(1); } 
            50% { filter: brightness(1.2); } 
            100% { filter: brightness(1); } 
        }
        
        .blue-chip-panel {
            position: absolute;
            right: 0; 
            top: 0;
            width: 38px; 
            height: 32px; 
            background-color: #225b82; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transform: translateX(0); 
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
        }

        .blue-chip-panel.active {
            opacity: 1;
            transform: translateX(38px); 
            animation: bluechip-glow 1.5s infinite ease-in-out;
        }

        .blue-chip-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .col-rank, .col-team, .col-alive, .col-pts, .col-kills { display: flex; align-items: center; height: 100%; line-height: 1; }
        .col-rank { justify-content: center; font-size: 16px; }
        .col-team { justify-content: flex-start; padding-left: 4px; }
        .header-row .col-team { padding-left: 28px; } 

        .col-alive { justify-content: center; gap: 2px; transform: translateX(-2px); }
        .col-pts, .col-kills { justify-content: center; font-size: 18px; }

        .header-row .col-rank, .header-row .col-team, .header-row .col-alive, .header-row .col-pts, .header-row .col-kills { font-size: 14px; letter-spacing: 0px; }
        .header-row .col-alive { transform: translateX(-2px); }
        .header-row .col-pts, .header-row .col-kills { transform: translateX(0); }

        .team-logo { width: 28px; height: 28px; margin-right: 8px; object-fit: contain; background-color: transparent; flex-shrink: 0; }
        .team-name { font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }

        .alive-bar { position: relative; width: 6px; height: 18px; border-radius: 1px; border: 1px solid #000000; box-sizing: border-box; background-color: #111111; overflow: hidden; }
        .hp-fill-small { position: absolute; bottom: 0; left: 0; width: 100%; transition: height 0.5s ease-out, background-color 0.5s ease; }

        .player-list { padding: 2px 8px 6px 34px; display: flex; flex-direction: column; gap: 5px; }
        .player-item { display: grid; grid-template-columns: 1fr 110px; align-items: center; gap: 10px; }
        .player-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--c-team-text-alive); }
        .player-name.dead { color: var(--c-team-text-dead); opacity: 0.7; }
        .player-hp-bar { height: 10px; background-color: #444; border: 1px solid #000; position: relative; overflow: hidden; }
        .player-hp-fill { height: 100%; transition: width 0.5s ease-out, background-color 0.5s ease; }

        .data-layer { position: relative; z-index: 5; width: 100%; }
        .banner-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; overflow: hidden;}

        @keyframes slide-pause-out-banner { 
            0% { transform: translateX(-105%); opacity: 1; } 
            15% { transform: translateX(0); opacity: 1; } 
            75% { transform: translateX(0); opacity: 1; } 
            95% { transform: translateX(105%); opacity: 1; } 
            100% { transform: translateX(105%); opacity: 0; } 
        }

        @keyframes slide-in-pause-out-gif { 
            0% { transform: translateX(-105%); opacity: 1; } 
            15% { transform: translateX(0); opacity: 1; } 
            85% { transform: translateX(0); opacity: 1; } 
            99% { transform: translateX(105%); opacity: 1; } 
            100% { transform: translateX(105%); opacity: 0; } 
        }
        
        .eliminated-banner.default-mode { 
            position: absolute; top: 0; left: 0; width: 100%; height: 32px; 
            background-color: var(--c-elim-bg); color: var(--c-elim-text); 
            display: flex; align-items: center; justify-content: center; font-size: 18px; transform: translateX(-105%); 
            animation: slide-pause-out-banner var(--gif-duration) ease-in-out forwards;
        }

        .eliminated-banner.gif-mode { 
            position: absolute; top: 0; left: 0; width: 100%; height: 32px; 
            background-size: cover; background-position: center; background-color: transparent; 
            display: flex; align-items: center; justify-content: center; transform: translateX(-105%); 
            animation: slide-in-pause-out-gif var(--gif-duration) ease-in-out forwards;
        }
        
        .revived-banner { 
            position: absolute; top: 0; left: 0; width: 100%; height: 32px; 
            background-image: url('./REVIVED.png'); background-size: cover; background-position: center;
            color: #ffffff; 
            display: flex; align-items: center; justify-content: center; font-size: 17px; transform: translateX(-105%); 
            animation: slide-pause-out-banner 4s ease-in-out forwards;
        }
        
        @keyframes bluezone-pulse { 0% { background-color: rgba(0, 150, 255, 0); } 50% { background-color: rgba(0, 150, 255, 0.4); } 100% { background-color: rgba(0, 150, 255, 0); } }
        .team-row-inner.in-bluezone .bg-layer::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 32px; animation: bluezone-pulse 1.5s infinite; z-index: 1; pointer-events: none; }

        @keyframes pulse-knocked {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .knocked-pulse {
            animation: pulse-knocked 1.5s infinite ease-in-out;
        }
        
        #error-msg { color: #f59600; font-size: 14px; background: #222; padding: 15px; border: 1px solid #f59600; display: none; }
        #demo-badge { position: absolute; top: -15px; left: 0; background: #2ecc71; color: #111; padding: 2px 8px; font-size: 12px; font-weight: bold !important; border-radius: 4px; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="error-msg">กรุณาระบุ Tournament ID ผ่านการเจนลิงก์จากหน้า Control Panel (index.html) ก่อนนำมาใส่ใน OBS ครับ</div>
    <div id="demo-badge">TEST MODE ACTIVED</div>

    <div id="main-scoreboard" style="display: none;">
        <div class="scoreboard-container">
            <div class="row-grid header-row">
                <div class="col-rank">#</div><div class="col-team">TEAM</div><div class="col-alive">ALIVE</div><div class="col-pts">PTS</div><div class="col-kills">KILLS</div>
            </div>
            <div id="scoreboard"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('tourney');
        const isDemoMode = urlParams.get('demo') === 'true';

        let API_URL = "";
        const LOCAL_LOGO_PATH = "http://localhost/Keng/"; 
        let useGifMode = true; 
        let gifDuration = 4.0; 

        let currentTeamsEliminated = {}; 
        let playerStates = {}; 
        let teamEliminatedTime = {}; 
        let top4Teams = []; 
        let isFirstRender = true;
        let top4EntryTime = 0; 
        let latestData = null;
        let previousAliveCount = 0; 
        
        // 💡 ตัวแปรเก็บสถานะการชุบบลูชิป (State Tracking)
        let teamBluechipCounts = {};
        let activeRecalls = {};

        let matchEndTime = 0;

        function isRecallingNow(val) {
            if (val === undefined || val === null) return false;
            if (typeof val === 'boolean') return val;
            if (typeof val === 'number') return val > 0;
            const str = String(val).toLowerCase().trim();
            return str === 'true' || str === '1' || str === 'recalling' || str === 'active' || str === 'yes' || str === 'y';
        }

        function runDemoSimulator() {
            let demoStep = 0;
            let d = { data: { teams: [] } };
            const demoTeams = ["TTB", "R3ZO", "BN", "KTC", "R1", "DWG", "LK", "SUP", "JKD", "BLS", "EXOS", "FUX", "ML", "SV", "WHY", "BABY"];
            
            function initDemoData() {
                d.data.teams = [];
                for (let i = 0; i < 16; i++) {
                    d.data.teams.push({
                        team_name: demoTeams[i], total_pts_rank: i + 1, total_pts_with_penalty: 160 - (i*5), match_kills: Math.floor(Math.random() * 5),
                        players: [1,2,3,4].map(n => ({ name: demoTeams[i]+"_P"+n, isAlive: true, health: 100, isGroggy: false, isInBlueZone: false })),
                        useBluechipCount: 0,
                        is_recalling: false
                    });
                }
            }
            initDemoData();

            function simulateStep() {
                const sortedTeams = [...d.data.teams].sort((a, b) => b.total_pts_with_penalty - a.total_pts_with_penalty);
                const getTeamByRank = (rank) => sortedTeams[rank - 1];
                const killTeam = (team) => { if(team) team.players.forEach(p => { p.isAlive = false; p.health = 0; }); };

                if (demoStep === 0) {
                    initDemoData(); 
                }
                else if (demoStep === 1) {
                    let t8 = getTeamByRank(8);
                    if (t8) {
                        t8.players[3].isAlive = false; 
                        t8.useBluechipCount = 1; // 💡 เริ่มใช้เครื่องชุบ
                    }
                }
                else if (demoStep === 2) {
                    let t8 = getTeamByRank(8);
                    if (t8) {
                        t8.players[3].isAlive = true; // 💡 เกิดใหม่ (ป้ายบลูชิปต้องพับ)
                    }
                }
                else if (demoStep === 3) {
                    killTeam(getTeamByRank(16)); killTeam(getTeamByRank(15));
                }
                else if (demoStep === 4) {
                    killTeam(getTeamByRank(14)); killTeam(getTeamByRank(13));
                }
                
                d.data.teams.forEach(t => {
                    if (t.players.some(p => p.isAlive)) {
                        let pts = Math.floor(Math.random() * 2);
                        t.match_kills += pts;
                        t.total_pts_with_penalty += pts;
                    }
                });

                d.data.teams.sort((a, b) => b.total_pts_with_penalty - a.total_pts_with_penalty);
                d.data.teams.forEach((t, i) => t.total_pts_rank = i + 1);

                renderScoreboard(d);
                demoStep = (demoStep + 1) % 10;
            }

            simulateStep(); 
            setInterval(simulateStep, 6000); 
        }

        function renderScoreboard(data) {
            if (!data || !data.data || !data.data.teams) return;
            latestData = data; 

            const totalAlivePlayers = data.data.teams.reduce((sum, t) => sum + (t.players ? t.players.filter(p => p.isAlive).length : 0), 0);
            let isMatchReset = false;
            if (totalAlivePlayers > previousAliveCount + 10 || isFirstRender) {
                isMatchReset = true;
            }
            previousAliveCount = totalAlivePlayers;

            if (isMatchReset) {
                matchEndTime = 0;
                top4EntryTime = 0;
                teamBluechipCounts = {};
                activeRecalls = {};
            }

            const scoreboard = document.getElementById('scoreboard');
            const oldPositions = {};
            scoreboard.querySelectorAll('.team-wrapper').forEach(row => { oldPositions[row.id] = row.getBoundingClientRect().top; });

            const sortedTeams = data.data.teams.sort((a, b) => a.total_pts_rank - b.total_pts_rank);
            const aliveTeams = sortedTeams.filter(t => t.players && t.players.some(p => p.isAlive));
            const aliveTeamsCount = aliveTeams.length;
            const isMatchEnded = aliveTeamsCount <= 1; 

            if (isMatchEnded) {
                if (matchEndTime === 0 && !isMatchReset) {
                    matchEndTime = Date.now();
                    setTimeout(() => { if (latestData) renderScoreboard(latestData); }, 6500); 
                }
            } else {
                matchEndTime = 0;
            }

            const showFinalStandings = (isMatchEnded && matchEndTime !== 0 && (Date.now() - matchEndTime >= 6000));
            const elimDurationMs = gifDuration * 1000;

            if (aliveTeamsCount <= 4 && !isMatchEnded) {
                if (top4EntryTime === 0 && !isMatchReset) {
                    top4EntryTime = Date.now();
                    setTimeout(() => { if (latestData) renderScoreboard(latestData); }, elimDurationMs + 100); 
                }
            }

            const isTop4Period = !isMatchEnded && !showFinalStandings && aliveTeamsCount <= 4 && (isMatchReset || (Date.now() - top4EntryTime >= elimDurationMs));

            if (isTop4Period && top4Teams.length === 0) {
                top4Teams = aliveTeams.map(t => t.team_name);
            } else if (!isTop4Period && !isMatchEnded) {
                top4Teams = []; 
            }

            sortedTeams.forEach((team, index) => {
                let wrapperRow = document.getElementById(`team-${team.team_name}`);
                if (!wrapperRow) {
                    wrapperRow = document.createElement('div');
                    wrapperRow.id = `team-${team.team_name}`;
                    wrapperRow.className = 'team-wrapper';
                    wrapperRow.innerHTML = `
                        <div class="blue-chip-panel"><img class="blue-chip-icon" src="./BLUECHIP.png"></div>
                        <div class="team-row-inner">
                            <div class="bg-layer"></div>
                            <div class="banner-layer"></div>
                            <div class="data-layer"><div class="row-grid-wrapper"></div></div>
                        </div>`;
                    scoreboard.appendChild(wrapperRow);
                }
                
                wrapperRow.style.order = index; 
                let innerRow = wrapperRow.querySelector('.team-row-inner');

                let teamIsAlive = false, teamInBlueZone = false, revivedPlayersQueue = [];
                let dotsHtml = '', playerDetailsHtml = ''; 

                // 💡 [Smart Logic] ตรวจสอบการเพิ่มขึ้นของ useBluechipCount จาก API
                let currentBluechipCount = team.useBluechipCount || 0;
                let isApiRecalling = isRecallingNow(team.is_recalling) || isRecallingNow(team.isRecalling);
                
                if (teamBluechipCounts[team.team_name] === undefined) {
                    teamBluechipCounts[team.team_name] = currentBluechipCount;
                }

                // ถ้าตัวเลขเพิ่มขึ้น หรือ API บอกว่ากำลัง Recall ให้เปิดแจ้งเตือน
                if (currentBluechipCount > teamBluechipCounts[team.team_name] || isApiRecalling) {
                    activeRecalls[team.team_name] = true;
                    teamBluechipCounts[team.team_name] = currentBluechipCount;
                }

                if (team.players) {
                    let sortedForDots = [...team.players].sort((a, b) => {
                        if (a.isAlive !== b.isAlive) return a.isAlive ? -1 : 1; 
                        return (b.health || 0) - (a.health || 0); 
                    });

                    let sortedForTop4List = [...team.players].sort((a, b) => (a.name || '').localeCompare(b.name || ''));

                    sortedForDots.forEach(p => {
                        if (p.isAlive) { 
                            teamIsAlive = true; 
                            if (p.isInBlueZone || p.is_in_bluezone || p.in_bluezone || p.inBlueZone) teamInBlueZone = true; 
                        }

                        let rawName = p.name || '';
                        let safeTeamName = team.team_name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        let prefixRegex = new RegExp('^' + safeTeamName + '[_\\-\\s]?', 'i');
                        let cleanName = rawName.replace(prefixRegex, '');

                        if (!isMatchReset && playerStates[rawName] === false && p.isAlive === true) {
                            revivedPlayersQueue.push(cleanName);
                        }
                        playerStates[rawName] = p.isAlive;

                        const pulseS = (p.isAlive && p.isGroggy) ? 'knocked-pulse' : '';
                        const colorS = p.isAlive ? (p.isGroggy ? 'var(--c-tick-knocked)' : 'var(--c-tick-alive)') : 'transparent';
                        dotsHtml += `<div class="alive-bar"><div class="hp-fill-small ${pulseS}" style="height:${p.isAlive?(p.isGroggy?100:(p.health||100)):0}%; background-color:${colorS};"></div></div>`;
                    });

                    sortedForTop4List.forEach(p => {
                        let rawName = p.name || '';
                        let safeTeamName = team.team_name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        let prefixRegex = new RegExp('^' + safeTeamName + '[_\\-\\s]?', 'i');
                        let cleanName = rawName.replace(prefixRegex, '');

                        const pulseL = (p.isAlive && p.isGroggy) ? 'knocked-pulse' : '';
                        const colorL = p.isAlive ? (p.isGroggy ? 'var(--c-hp-knocked)' : 'var(--c-hp-alive)') : 'transparent';
                        
                        playerDetailsHtml += `
                            <div class="player-item">
                                <div class="player-name ${p.isAlive ? '' : 'dead'}">${cleanName}</div>
                                <div class="player-hp-bar"><div class="player-hp-fill ${pulseL}" style="width:${p.isAlive?(p.isGroggy?100:(p.health||100)):0}%; background-color:${colorL};"></div></div>
                            </div>`;
                    });
                }

                // 💡 [Smart Logic] ถ้าตรวจพบคนเกิดใหม่ ให้พับเก็บป้ายบลูชิปทันที
                if (revivedPlayersQueue.length > 0) {
                    activeRecalls[team.team_name] = false;
                }

                // สั่งแสดงผลป้ายบลูชิป
                const bcPanel = wrapperRow.querySelector('.blue-chip-panel');
                if (bcPanel) {
                    if (activeRecalls[team.team_name] && teamIsAlive) {
                        bcPanel.classList.add('active');
                    } else {
                        bcPanel.classList.remove('active');
                    }
                }

                if (!teamIsAlive && !currentTeamsEliminated[team.team_name] && !isMatchReset) {
                    currentTeamsEliminated[team.team_name] = true;
                    teamEliminatedTime[team.team_name] = Date.now();
                    
                    const cacheBuster = Date.now();
                    const bannerClass = useGifMode ? 'eliminated-banner gif-mode animate' : 'eliminated-banner default-mode animate';
                    const bannerText = useGifMode ? '' : '>> ELIMINATED <<';
                    const inlineStyle = useGifMode ? `style="background-image: url('${LOCAL_LOGO_PATH}ELIMINATED.gif?t=${cacheBuster}');"` : '';
                    
                    innerRow.querySelector('.banner-layer').innerHTML = `<div class="${bannerClass}" ${inlineStyle}>${bannerText}</div>`;
                    setTimeout(() => { if(innerRow.querySelector('.eliminated-banner')) innerRow.querySelector('.eliminated-banner').remove(); }, elimDurationMs + 50);

                    if (isTop4Period && !top4Teams.includes(team.team_name)) {
                        setTimeout(() => { innerRow.classList.remove('expanded'); innerRow.classList.add('collapsed'); }, elimDurationMs * 0.8);
                        setTimeout(() => { wrapperRow.classList.add('hidden-top4'); }, elimDurationMs);
                    }
                }

                if (revivedPlayersQueue.length > 0 && !isMatchReset) {
                    currentTeamsEliminated[team.team_name] = false; 
                    revivedPlayersQueue.forEach((playerName, idx) => {
                        setTimeout(() => {
                            const cacheBuster = Date.now() + idx;
                            const bannerHtml = document.createElement('div');
                            bannerHtml.className = 'revived-banner animate';
                            bannerHtml.style.backgroundImage = `url('./REVIVED.png?t=${cacheBuster}')`;
                            bannerHtml.innerHTML = `<span class="revived-text">REVIVED: ${playerName}</span>`;
                            innerRow.querySelector('.banner-layer').appendChild(bannerHtml);
                            setTimeout(() => { bannerHtml.remove(); }, 4050);
                        }, idx * 4200);
                    });
                }

                let expansionClass = 'collapsed', visibilityClass = ''; 
                const timeSinceDeath = Date.now() - (teamEliminatedTime[team.team_name] || 0);

                if (showFinalStandings) {
                    expansionClass = 'collapsed';
                } else if (isMatchEnded) {
                    if (top4Teams.includes(team.team_name) || top4Teams.length === 0) expansionClass = teamIsAlive ? 'expanded' : 'collapsed';
                    else visibilityClass = 'hidden-top4';
                } else if (isTop4Period) {
                    if (top4Teams.includes(team.team_name)) expansionClass = teamIsAlive ? 'expanded' : 'collapsed';
                    else {
                        if (timeSinceDeath < elimDurationMs * 0.8) expansionClass = 'expanded';
                        else if (timeSinceDeath < elimDurationMs) expansionClass = 'collapsed';
                        else visibilityClass = 'hidden-top4';
                    }
                }

                const themeClass = index === 0 ? 'first-place' : 'normal-place';
                const bluezoneClass = (teamInBlueZone && teamIsAlive) ? 'in-bluezone' : '';
                
                wrapperRow.classList.remove('hidden-top4');
                if(visibilityClass === 'hidden-top4') wrapperRow.classList.add('hidden-top4');

                innerRow.className = `team-row-inner ${themeClass} ${expansionClass} ${!teamIsAlive ? 'eliminated-team' : ''} ${bluezoneClass}`;
                
                const logoSrc = `${LOCAL_LOGO_PATH}${team.team_name}.png`;
                innerRow.querySelector('.row-grid-wrapper').innerHTML = `
                    <div class="row-grid">
                        <div class="col-rank">${index + 1}</div>
                        <div class="col-team"><img class="team-logo" src="${logoSrc}" onerror="this.style.visibility='hidden'"><div class="team-name">${team.team_name}</div></div>
                        <div class="col-alive">${dotsHtml}</div>
                        <div class="col-pts">${team.total_pts_with_penalty}</div>
                        <div class="col-kills">${team.match_kills}</div>
                    </div>
                    <div class="player-list">${playerDetailsHtml}</div>
                `;
            });

            requestAnimationFrame(() => {
                scoreboard.querySelectorAll('.team-wrapper').forEach(wrapperRow => {
                    const oldTop = oldPositions[wrapperRow.id];
                    if (oldTop !== undefined) {
                        const deltaY = oldTop - wrapperRow.getBoundingClientRect().top;
                        if (deltaY !== 0) {
                            wrapperRow.style.transition = 'none';
                            wrapperRow.style.transform = `translateY(${deltaY}px)`;
                            wrapperRow.classList.add('is-moving'); 
                            requestAnimationFrame(() => {
                                wrapperRow.style.transition = 'transform 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                                wrapperRow.style.transform = '';
                                setTimeout(() => { wrapperRow.classList.remove('is-moving'); }, 600);
                            });
                        }
                    }
                });
            });

            isFirstRender = false;
        }

        async function fetchRealTimeData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const apiData = await response.json();
                renderScoreboard(apiData);
            } catch (error) {
                console.error("Error fetching live leaderboard:", error);
            }
        }

        if (!tourneyId && !isDemoMode) {
            document.getElementById('error-msg').style.display = 'block';
        } else {
            document.getElementById('main-scoreboard').style.display = 'block';

            if(urlParams.has('bg')) document.documentElement.style.setProperty('--c-header-bg', '#' + urlParams.get('bg'));
            if(urlParams.has('ht')) document.documentElement.style.setProperty('--c-header-text', '#' + urlParams.get('ht'));
            if(urlParams.has('tba')) document.documentElement.style.setProperty('--c-team-bg-alive', '#' + urlParams.get('tba'));
            if(urlParams.has('tta')) document.documentElement.style.setProperty('--c-team-text-alive', '#' + urlParams.get('tta'));
            if(urlParams.has('tbd')) document.documentElement.style.setProperty('--c-team-bg-dead', '#' + urlParams.get('tbd'));
            if(urlParams.has('ttd')) document.documentElement.style.setProperty('--c-team-text-dead', '#' + urlParams.get('ttd'));
            if(urlParams.has('tca')) document.documentElement.style.setProperty('--c-tick-alive', '#' + urlParams.get('tca'));
            if(urlParams.has('tck')) document.documentElement.style.setProperty('--c-tick-knocked', '#' + urlParams.get('tck'));
            if(urlParams.has('hpa')) document.documentElement.style.setProperty('--c-hp-alive', '#' + urlParams.get('hpa'));
            if(urlParams.has('hpk')) document.documentElement.style.setProperty('--c-hp-knocked', '#' + urlParams.get('hpk'));
            if(urlParams.has('ebg')) document.documentElement.style.setProperty('--c-elim-bg', '#' + urlParams.get('ebg'));
            if(urlParams.has('etx')) document.documentElement.style.setProperty('--c-elim-text', '#' + urlParams.get('etx'));
            
            if(urlParams.has('gif')) useGifMode = urlParams.get('gif') === 'true';
            
            if(urlParams.has('dur')) {
                gifDuration = parseFloat(urlParams.get('dur')) || 4.0;
                document.documentElement.style.setProperty('--gif-duration', `${gifDuration}s`);
            }

            if (isDemoMode) {
                document.getElementById('demo-badge').style.display = 'block';
                runDemoSimulator(); 
            } else {
                API_URL = `https://domestic.atum.live/api/pubg/liveleaderboard?account_id=nttapon7799&series=${tourneyId}&tournament_id=${tourneyId}&mode=post&all_teams=true`;
                fetchRealTimeData();
                setInterval(fetchRealTimeData, 1000); 
            }
        }
    </script>
</body>
</html>
