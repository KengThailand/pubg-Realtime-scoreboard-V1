<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Scoreboard - Control Panel</title>
    <style>
        @font-face {
            font-family: 'TransducerCondensed';
            src: url('transducer-condensedbold.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }
        * { font-family: 'TransducerCondensed', sans-serif; letter-spacing: 0.5px; font-weight: normal !important; }
        body { margin: 0; padding: 40px 20px; background-color: #222; display: flex; justify-content: center; align-items: flex-start; }

        #setup-panel {
            background-color: #1a1a1a; padding: 30px; border-radius: 0; width: 850px;
            box-sizing: border-box; color: #fff; 
            border: 1px solid #444; box-shadow: 0px 8px 20px rgba(0,0,0,0.8);
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }

        h3 { margin: 0 0 15px 0; font-size: 20px; color: #f59600; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 8px; }
        label { display: block; font-size: 15px; margin-bottom: 5px; color: #bbb; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box;
            background-color: #111; border: 1px solid #555; color: #fff; border-radius: 0; font-size: 16px;
        }
        
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .color-item { display: flex; flex-direction: column; }
        .color-item input[type="color"] { width: 100%; height: 36px; border: none; padding: 0; cursor: pointer; background: none; border-radius: 0; overflow: hidden; }
        .color-item input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .color-item input[type="color"]::-webkit-color-swatch { border: 1px solid #555; border-radius: 0; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background-color: #111; padding: 12px; border-radius: 0; border: 1px solid #333; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; margin: 0; }
        .checkbox-group label { color: #fff; font-size: 15px; cursor: pointer; margin: 0; }

        .result-box { background-color: #000; padding: 20px; border-radius: 0; border: 1px solid #f59600; margin-top: 10px; }
        .result-box label { color: #f59600; font-size: 15px; font-weight: bold !important; display: block; margin-bottom: 8px;}
        .result-box input { width: 100%; margin-bottom: 15px; background-color: #222; border: 1px solid #444; color: #00ffcc; font-family: monospace; font-size: 13px; padding: 12px; box-sizing: border-box; }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 15px; border: none; border-radius: 0; cursor: pointer; 
            text-transform: uppercase; font-size: 18px; transition: 0.2s; font-weight: bold !important;
        }
        #btn-copy { background-color: #444; color: #fff; }
        #btn-copy:hover { background-color: #555; }
        #btn-open { background-color: #f59600; color: #fff; }
        #btn-open:hover { background-color: #ffaa00; }
        
        .btn-small { padding: 10px; font-size: 14px; }
        #btn-save { background-color: #27ae60; color: #fff; }
        #btn-save:hover { background-color: #2ecc71; }
        #btn-reset { background-color: #c0392b; color: #fff; }
        #btn-reset:hover { background-color: #e74c3c; }

        @media (max-width: 800px) {
            #setup-panel { grid-template-columns: 1fr; width: 100%; max-width: 450px; gap: 20px; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="setup-panel">
        <div class="panel-col">
            <h3>1. API CONFIGURATION</h3>
            <label>Tournament ID:</label>
            <input type="text" id="input-tourney-id" value="" placeholder="e.g., sea-thsc">

            <h3>2. THEME COLORS</h3>
            <div class="color-grid">
                <div class="color-item"><label>Header BG</label><input type="color" id="bg" value="#f59600"></div>
                <div class="color-item"><label>Header Text</label><input type="color" id="ht" value="#ffffff"></div>
                <div class="color-item"><label>Alive Team BG</label><input type="color" id="tba" value="#ffffff"></div>
                <div class="color-item"><label>Alive Team Text</label><input type="color" id="tta" value="#000000"></div>
                <div class="color-item"><label>Dead Team BG</label><input type="color" id="tbd" value="#222222"></div>
                <div class="color-item"><label>Dead Team Text</label><input type="color" id="ttd" value="#7a7a7a"></div>
                
                <div class="color-item"><label>Alive Tick (ALIVE Col)</label><input type="color" id="tca" value="#ffffff"></div>
                <div class="color-item"><label>Knocked Tick (ALIVE Col)</label><input type="color" id="tck" value="#ff0000"></div>
                
                <div class="color-item"><label>Alive HP Bar</label><input type="color" id="hpa" value="#2ecc71"></div>
                <div class="color-item"><label>Knocked HP Bar</label><input type="color" id="hpk" value="#ff0000"></div>
                <div class="color-item"><label>Eliminated BG</label><input type="color" id="ebg" value="#ccee00"></div>
                <div class="color-item"><label>Eliminated Text</label><input type="color" id="etx" value="#111111"></div>
            </div>
            
            <div class="btn-group" style="margin-bottom: 10px;">
                <button id="btn-save" class="btn-small" onclick="saveSettings()">💾 SAVE SETTINGS</button>
                <button id="btn-reset" class="btn-small" onclick="resetSettings()">🔄 RESET DEFAULTS</button>
            </div>
        </div>

        <div class="panel-col">
            <h3>3. BANNER SETTINGS</h3>
            <div class="checkbox-group">
                <input type="checkbox" id="check-use-gif" checked>
                <label for="check-use-gif">Use Custom ELIMINATED.gif</label>
            </div>
            <div>
                <label>Banner/GIF Duration (Seconds):</label>
                <input type="number" id="input-gif-duration" value="4.0" step="0.1" style="margin-bottom: 0;">
            </div>

            <div class="result-box" style="margin-top: 25px;">
                <label>🔴 LIVE URL (For Real Match):</label>
                <input type="text" id="generated-url" readonly>
                <div class="btn-group">
                    <button id="btn-copy" onclick="copyLink('generated-url')">📋 COPY URL</button>
                    <button id="btn-open" onclick="openLink('generated-url')">OPEN LIVE ↗</button>
                </div>
            </div>

            <h3 style="margin-top: 30px; color: #2ecc71; border-bottom: 1px solid #2ecc71;">4. DEMO & TEST SYSTEM</h3>
            <p style="font-size: 13px; color: #bbb; margin-top: -10px;">Use this URL to automatically simulate Eliminations, Revives, and Top 4 animations in OBS without a real match.</p>
            <div class="result-box" style="border-color: #2ecc71;">
                <label style="color: #2ecc71;">🧪 DEMO URL (For Testing Only):</label>
                <input type="text" id="demo-url" readonly>
                <div class="btn-group">
                    <button onclick="copyLink('demo-url')" style="background-color: #27ae60; color: #fff;">📋 COPY DEMO</button>
                    <button onclick="openLink('demo-url')" style="background-color: #2ecc71; color: #111;">TEST DEMO ↗</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 💡 เพิ่ม tca และ tck เข้าไปใน Default Settings
        const defaultSettings = {
            'bg': '#f59600', 'ht': '#ffffff', 'tba': '#ffffff', 'tta': '#000000',
            'tbd': '#222222', 'ttd': '#7a7a7a', 'tca': '#ffffff', 'tck': '#ff0000',
            'hpa': '#2ecc71', 'hpk': '#ff0000', 'ebg': '#ccee00', 'etx': '#111111', 
            'input-tourney-id': '', 'input-gif-duration': '4.0'
        };

        function loadSettings() {
            for (let key in defaultSettings) {
                if (localStorage.getItem('pubg_sb_' + key) !== null) {
                    document.getElementById(key).value = localStorage.getItem('pubg_sb_' + key);
                }
            }
            if (localStorage.getItem('pubg_sb_check-use-gif') !== null) {
                document.getElementById('check-use-gif').checked = localStorage.getItem('pubg_sb_check-use-gif') === 'true';
            }
            updateLink();
        }

        function saveSettings() {
            for (let key in defaultSettings) {
                localStorage.setItem('pubg_sb_' + key, document.getElementById(key).value);
            }
            localStorage.setItem('pubg_sb_check-use-gif', document.getElementById('check-use-gif').checked);
            alert("✅ Settings saved! These colors will load automatically next time.");
        }

        function resetSettings() {
            if(!confirm("⚠️ Are you sure you want to reset all colors to default?")) return;
            
            for (let key in defaultSettings) {
                document.getElementById(key).value = defaultSettings[key];
                localStorage.removeItem('pubg_sb_' + key);
            }
            document.getElementById('check-use-gif').checked = true;
            localStorage.removeItem('pubg_sb_check-use-gif');
            
            updateLink();
        }

        function updateLink() {
            const tourney = document.getElementById('input-tourney-id').value.trim() || 'demo';
            const bg = document.getElementById('bg').value.replace('#', '');
            const ht = document.getElementById('ht').value.replace('#', '');
            const tba = document.getElementById('tba').value.replace('#', '');
            const tta = document.getElementById('tta').value.replace('#', '');
            const tbd = document.getElementById('tbd').value.replace('#', '');
            const ttd = document.getElementById('ttd').value.replace('#', '');
            const tca = document.getElementById('tca').value.replace('#', ''); // 💡 ส่งค่าสีขีด Alive
            const tck = document.getElementById('tck').value.replace('#', ''); // 💡 ส่งค่าสีขีด Knocked
            const hpa = document.getElementById('hpa').value.replace('#', '');
            const hpk = document.getElementById('hpk').value.replace('#', '');
            const ebg = document.getElementById('ebg').value.replace('#', '');
            const etx = document.getElementById('etx').value.replace('#', '');
            const gif = document.getElementById('check-use-gif').checked;
            const dur = document.getElementById('input-gif-duration').value;

            let currentUrl = window.location.href.split('?')[0];
            if (currentUrl.endsWith('index.html')) currentUrl = currentUrl.replace('index.html', '');
            if (!currentUrl.endsWith('/')) currentUrl += '/';
            
            // 💡 เพิ่ม tca และ tck ลงใน URL Parameter
            const params = `bg=${bg}&ht=${ht}&tba=${tba}&tta=${tta}&tbd=${tbd}&ttd=${ttd}&tca=${tca}&tck=${tck}&hpa=${hpa}&hpk=${hpk}&ebg=${ebg}&etx=${etx}&gif=${gif}&dur=${dur}`;
            
            document.getElementById('generated-url').value = `${currentUrl}overlay.html?tourney=${tourney}&${params}`;
            document.getElementById('demo-url').value = `${currentUrl}overlay.html?demo=true&${params}`;
        }

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => input.addEventListener('input', updateLink));
        inputs.forEach(input => input.addEventListener('change', updateLink));

        function copyLink(inputId) {
            if(inputId === 'generated-url' && document.getElementById('input-tourney-id').value.trim() === "") {
                alert("Please enter a Tournament ID for the Live URL."); 
                document.getElementById('input-tourney-id').focus();
                return;
            }
            const copyText = document.getElementById(inputId);
            copyText.select();
            document.execCommand("copy");
            alert(inputId === 'demo-url' ? "Demo URL copied to clipboard!" : "Live URL copied to clipboard!");
        }

        function openLink(inputId) {
            const url = document.getElementById(inputId).value;
            if(inputId === 'generated-url' && document.getElementById('input-tourney-id').value.trim() === "") {
                alert("Please enter a Tournament ID."); 
                document.getElementById('input-tourney-id').focus();
                return;
            }
            window.open(url, '_blank');
        }

        window.onload = loadSettings;

    </script>
</body>
</html>
